<section class="blog-article container mt-5">
  <div class="row">
    <div class="col-12">
      <h2>{{article.title}}</h2>
      <div class="mb-3 text-muted">{{article.date}} • par {{article.author}}</div>
      <div class="mb-4">
        <img [src]="article.image" alt="{{article.title}}" class="img-fluid" />
      </div>
      <div class="article-content" [innerHTML]="article.content"></div>
      <div class="mt-4">
        <a href="/" class="btn btn-outline-secondary">Retour</a>
        <a [href]="article.image" download class="btn btn-primary ms-2">Télécharger l'image</a>
      </div>
    </div>
  </div>
</section>
