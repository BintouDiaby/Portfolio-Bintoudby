<section class="contact" id="contact">
  <div class="container d-flex flex-column justify-content-between h-100 ">
    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2  data-aos="heading-show" class="text_background">
              Contactez-moi
              <span class="heading_background">Me joindre</span>
            </h2>
            <p class="m-0">N'hésitez pas à me contacter pour des collaborations, stages ou questions.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1">
      <div class="row">
        <div class="col-sm-4">
          <div class="d-flex flex-row flex-sm-column flex-md-row justify-content-md-center mb-3 text-left text-sm-center text-md-left">
            <div class="contact-icon mr-md-3 mr-3 mr-sm-0">
              <span class="mbri-letter"></span>
            </div>
            <div class="contact-details mt-2">
              <h5>Email</h5>
              <p><a href="mailto:bdby0706@gmail.com">bdby0706@gmail.com</a></p>
            </div>
          </div>
        </div>
        <div class="col-sm-4">
          <div class="d-flex flex-row flex-sm-column flex-md-row justify-content-md-center mb-3 text-left text-sm-center text-md-left">
            <div class="contact-icon mr-md-3 mr-3 mr-sm-0">
              <span class="mbri-mobile"></span>
            </div>
            <div class="contact-details mt-2">
              <h5>Téléphone</h5>
              <p><a href="tel:+2250707066950">+225 07 07 06 69 50</a></p>
            </div>
          </div>
        </div>
        <div class="col-sm-4">
          <div class="d-flex flex-row flex-sm-column flex-md-row justify-content-md-center mb-3 text-left text-sm-center text-md-left">
            <div class="contact-icon mr-md-3 mr-3 mr-sm-0">
              <span class="mbri-map-pin"></span>
            </div>
            <div class="contact-details mt-2">
              <h5>Localisation</h5>
              <p>Abidjan, Côte d'Ivoire</p>
            </div>
          </div>
        </div>
      </div>


      <div class="row mt-5">
        <div class="col-lg-12">
          <form id="contact-form">
            <div class="row">
              <div class="col-lg-6 mt-3">
                <div class="form-group">
                  <input type="text" name="name" id="name" class="form-control" autocomplete="off" required>
                  <label>Full Name</label>
                </div>
              </div>
              <div class="col-lg-6 mt-3">
                <div class="form-group">
                  <input type="email" name="email" id="email" class="form-control" autocomplete="off" required>
                  <label>Email</label>
                </div>
              </div>
              <div class="col-lg-12 mt-3">
                <div class="form-group">
                  <input type="text" name="subject" id="subject" class="form-control" autocomplete="off" required>
                  <label>Subject</label>
                </div>
              </div>
              <div class="col-lg-12 mt-3">
                <div class="form-group">
                  <textarea name="text" id="text"  rows="6" class="form-control" required></textarea>
                  <label>Message</label>
                </div>
              </div>
              <div class="col-lg-12 mt-3">
                <div class="form-group mb-0 text-right">
                  <div class="d-flex justify-content-end gap-2">
                    <button type="button" id="open-mail-client" class="btn btn-secondary">
                      Ouvrir mon client mail
                    </button>
                    <button type="submit" id="contact-btn" class="btn btn-outline-primary btn-bg">
                      Envoyer via le site
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </form>
          <div id="contact-status" role="status" aria-live="polite" class="mt-3"></div>
        </div>
      </div>

    </div>


  </div>
</section>
